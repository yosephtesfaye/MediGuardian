services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediguardian-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mediguardian-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

